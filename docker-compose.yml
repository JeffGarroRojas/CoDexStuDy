version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studyia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyia
      POSTGRES_PASSWORD: studyia123
      POSTGRES_DB: studyia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyia -d studyia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studyia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./servidor
      dockerfile: Dockerfile
    container_name: studyia-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://studyia:studyia123@postgres:5432/studyia?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./interfaz
      dockerfile: Dockerfile
    container_name: studyia-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
